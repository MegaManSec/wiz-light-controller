name: Release

# Manual release. The `version` in the root package.json is the single source of
# truth: a release is cut only when that version has no matching `vX.Y.Z` tag yet.
# Trigger it deliberately (the Actions UI, or `gh workflow run release.yml`).
# Auto-publish on every push to main is supported but currently disabled (see the
# `on:` block) — re-enable it once you want version bumps to ship automatically.
# Release notes are a Conventional-Commit changelog over the range since the last
# tag, generated by the dependency-free scripts/release-notes.mjs.
#
# NOTE: this workflow is platform-independent — it publishes the npm tarballs
# (wiz-light-core, wiz-light-cli) only. The native macOS app is built and attached
# to the same Release by a separate, tag-triggered workflow (macos-build.yml),
# which listens on the `vX.Y.Z` tag created here.

on:
  workflow_dispatch:
  # Auto-publish on version bump is disabled for now. Uncomment to re-enable, so a
  # push to main that bumps the package version cuts a release automatically:
  # push:
  #   branches: [main]

# Serialise releases; never cancel one mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the tag + GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history + tags: the gate checks for an existing version tag and
          # release-notes.mjs diffs the range since the last tag.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install dependencies
        # Reproducible, integrity-checked install from the committed lockfile.
        run: pnpm install --frozen-lockfile

      - name: Check for a version bump
        id: gate
        # Emit `version` only when the root package.json version has no matching
        # tag yet. Every later step keys off this output, so an un-bumped push
        # does nothing.
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "v$VERSION already released — no version bump, nothing to publish."
          else
            echo "New version v$VERSION — will publish."
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.gate.outputs.version != ''
        # Pure Node, zero deps — Conventional-Commit changelog since the last tag.
        run: node scripts/release-notes.mjs > RELEASE_NOTES.md

      - name: Pack workspace tarballs
        if: steps.gate.outputs.version != ''
        # The package.json files already carry the release version (the source of
        # truth), so `pnpm pack` produces correctly-versioned tarballs directly.
        run: |
          mkdir -p artifacts
          dest="$PWD/artifacts"
          # pnpm 10's `pack` is single-package (it rejects `--filter`), so pack
          # each workspace package from its own directory into the shared dir.
          ( cd packages/core && pnpm pack --pack-destination "$dest" )
          ( cd packages/cli && pnpm pack --pack-destination "$dest" )

      - name: Create GitHub Release
        if: steps.gate.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.gate.outputs.version }}
        # gh creates the vX.Y.Z tag at this commit (the verified merge commit on
        # main) and the Release, and uploads the npm tarballs as assets.
        run: |
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md \
            artifacts/*.tgz

      # The native macOS build runs in macos-build.yml, triggered by the
      # `vX.Y.Z` tag this step creates. Note: a tag created by the default
      # GITHUB_TOKEN does NOT auto-trigger other workflows (GitHub suppresses that
      # to avoid recursion), so macos-build.yml also accepts a manual
      # `gh workflow run --ref "v$VERSION"` dispatch.
