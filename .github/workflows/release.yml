name: Release

# Publish-on-version-bump. The `version` in the root package.json is the single
# source of truth: a release is cut only when that version has no matching
# `vX.Y.Z` tag yet — so a push to main that bumps the version publishes
# automatically, while pushes that don't change it are no-ops. You can also run it
# manually (the Actions UI, or `gh workflow run release.yml`). Release notes are a
# Conventional-Commit changelog over the range since the last tag, generated by
# the dependency-free scripts/release-notes.mjs.
#
# This workflow publishes the npm tarballs (wiz-light-core, wiz-light-cli). The
# native macOS app is built and attached to the same Release by the `build-macos`
# job below, which calls the reusable macos-build.yml once the release is cut.

on:
  workflow_dispatch:
  # A push to main that bumps the package version cuts a release automatically;
  # the version gate no-ops pushes that don't change it.
  push:
    branches: [main]

# Serialise releases; never cancel one mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Surfaced so the macOS job below runs only when a release was actually cut.
    outputs:
      version: ${{ steps.gate.outputs.version }}
    permissions:
      contents: write # create the tag + GitHub Release
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history + tags: the gate checks for an existing version tag and
          # release-notes.mjs diffs the range since the last tag.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install dependencies
        # Reproducible, integrity-checked install from the committed lockfile.
        run: pnpm install --frozen-lockfile

      - name: Check for a version bump
        id: gate
        # Emit `version` only when the root package.json version has no matching
        # tag yet. Every later step keys off this output, so an un-bumped push
        # does nothing.
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "v$VERSION already released — no version bump, nothing to publish."
          else
            echo "New version v$VERSION — will publish."
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify versions are in lockstep
        if: steps.gate.outputs.version != ''
        # The release keys everything off the single root version — tarball names,
        # the tag, and the app's CFBundleShortVersionString. Fail here, before any
        # publish, if a source disagrees, so a half-bumped set can never ship.
        env:
          VERSION: ${{ steps.gate.outputs.version }}
        run: |
          core=$(node -p "require('./packages/core/package.json').version")
          cli=$(node -p "require('./packages/cli/package.json').version")
          plist=$(grep -A1 '<key>CFBundleShortVersionString</key>' apps/macos/build/Info.plist \
            | grep -oE '<string>[^<]*</string>' | head -1 | sed -E 's#</?string>##g')
          echo "root=$VERSION  core=$core  cli=$cli  macos=$plist"
          status=0
          for entry in "packages/core=$core" "packages/cli=$cli" "apps/macos Info.plist=$plist"; do
            if [ "${entry#*=}" != "$VERSION" ]; then
              echo "::error::${entry%%=*} is at ${entry#*=}, but the release version is $VERSION"
              status=1
            fi
          done
          if [ "$status" -ne 0 ]; then
            echo "Every package version and the app's CFBundleShortVersionString must match the root ($VERSION) — bump them in lockstep."
            exit 1
          fi
          echo "All version sources are in lockstep at $VERSION."

      - name: Generate release notes
        if: steps.gate.outputs.version != ''
        # Pure Node, zero deps — Conventional-Commit changelog since the last tag.
        run: node scripts/release-notes.mjs > RELEASE_NOTES.md

      - name: Pack workspace tarballs
        if: steps.gate.outputs.version != ''
        # The package.json files already carry the release version (the source of
        # truth), so `pnpm pack` produces correctly-versioned tarballs directly.
        run: |
          mkdir -p artifacts
          dest="$PWD/artifacts"
          # pnpm 10's `pack` is single-package (it rejects `--filter`), so pack
          # each workspace package from its own directory into the shared dir.
          ( cd packages/core && pnpm pack --pack-destination "$dest" )
          ( cd packages/cli && pnpm pack --pack-destination "$dest" )

      - name: Publish to npm (OIDC trusted publishing)
        if: steps.gate.outputs.version != ''
        # No NPM_TOKEN: npm trades this workflow's OIDC token for short-lived
        # credentials via the per-package "Trusted Publisher" configured on npmjs.
        # Runs before the tag/Release below so a failure here stays fully
        # retryable (the gate keys off the tag, which isn't created yet). The
        # tarballs already have `workspace:*` resolved by `pnpm pack`. We pack with
        # pnpm (pinned via corepack) but publish with a pinned npm: pnpm's own OIDC
        # publish only exists in pnpm 11+, which currently regresses on it
        # (pnpm/pnpm#11513), and we pin pnpm 10. Idempotent: a version already on
        # the registry is skipped (e.g. the bootstrap 0.1.0), so core publishes
        # before cli and re-runs are safe.
        env:
          VERSION: ${{ steps.gate.outputs.version }}
        run: |
          npm install -g npm@11.5.1 # pinned; trusted publishing needs npm >= 11.5.1
          for pkg in wiz-light-core wiz-light-cli; do
            if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "$pkg@$VERSION already on npm — skipping."
            else
              npm publish "./artifacts/$pkg-$VERSION.tgz" --access public --provenance
            fi
          done

      - name: Create GitHub Release
        if: steps.gate.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.gate.outputs.version }}
        # gh creates the vX.Y.Z tag at this commit (the verified merge commit on
        # main) and the Release, and uploads the npm tarballs as assets.
        run: |
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md \
            artifacts/*.tgz

  # When (and only when) a release was cut, build the native macOS app and attach
  # it to that Release — in the same run. We call macos-build.yml directly instead
  # of relying on the new tag to trigger it: a tag created by the default
  # GITHUB_TOKEN does not trigger other workflows (GitHub's anti-recursion rule),
  # and the alternative — a long-lived PAT — is worse for security.
  build-macos:
    needs: release
    if: needs.release.outputs.version != ''
    permissions:
      contents: write # attach the app to the Release
      id-token: write # build-provenance attestation
      attestations: write
    uses: ./.github/workflows/macos-build.yml
    with:
      release-tag: v${{ needs.release.outputs.version }}
    secrets: inherit # forwards the (optional) Apple signing secrets; none → ad-hoc
